# ─── Server ───────────────────────────────────────────────
server.port=8080

# ─── Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/labelforge
spring.datasource.username=labelforge_user
spring.datasource.password=change_me_in_prod
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA ──────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ─── Barcode / EAN-13 config ──────────────────────────────
# Internal prefix (2xxxxx range = store/internal use, no GS1 needed for MVP)
labelforge.ean.company-prefix=20001
# Starting item reference counter (only used for DB seed, DB sequence takes over)
labelforge.ean.start-counter=1

# ─── CORS (allow React dev server) ────────────────────────
labelforge.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ─── Actuator (health check) ──────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
